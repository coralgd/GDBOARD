<script type="module">
import { auth, db } from "./firebase.js";
import { doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const uid = auth.currentUser.uid;
const ref = doc(db,"users",uid);
const snap = await getDoc(ref);

if (snap.data().situation === "verified")
  location.href="home.html";

window.sendNick = async () => {
  await updateDoc(ref,{ nick: nick.value, situation:"requested" });
  alert("Отправлено");
}
</script>

<input id="nick">
<button onclick="sendNick()">Отправить</button>
