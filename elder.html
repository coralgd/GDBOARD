<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Панель старшего модератора</title>
</head>
<body>

<h1>Панель старшего модератора</h1>
<div id="users"></div>

<script type="module">
import { guard } from "./guard.js";
guard({ needVerified:true, needRole:"elder" });

import { db } from "./firebase.js";
import {
  collection, getDocs, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const div = document.getElementById("users");
const snap = await getDocs(collection(db,"users"));

snap.forEach(d=>{
  const u = d.data();
  div.innerHTML += `
    <div>
      <b>${u.email}</b> | ${u.nick || "без ника"}
      | situation: ${u.situation}
      | role: ${u.role}
      | points: ${u.points}
      <br>
      <button onclick="verify('${d.id}')">Verified</button>
      <button onclick="unverify('${d.id}')">Unverified</button>
      <button onclick="makeMod('${d.id}')">Сделать модером</button>
    </div><hr>
  `;
});

window.verify = uid =>
  updateDoc(doc(db,"users",uid),{ situation:"verified" });

window.unverify = uid =>
  updateDoc(doc(db,"users",uid),{ situation:"requested" });

window.makeMod = uid =>
  updateDoc(doc(db,"users",uid),{ role:"moderator" });

</script>
</body>
</html>
