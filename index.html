<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GDBOARD</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg"></canvas>

<div class="panel">
  <h1>GDBOARD</h1>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">

  <button onclick="register()">Регистрация</button>
  <button onclick="login()">Вход</button>

  <p id="status"></p>

  <!-- Username выбирается только при первом входе -->
  <div id="usernamePanel" class="hidden">
    <p>Выберите Username:</p>
    <input id="usernameInput" placeholder="Username">
    <button onclick="setUsername()">Подтвердить</button>
  </div>

  <!-- Elder Moderator Panel -->
  <div id="elderPanel" class="hidden">
    <h3>ELDER MODERATOR</h3>
    <div id="userList"></div>
  </div>

  <a id="checkBtnLink" href="check.html" class="link">Проверка модератора</a>
  <a href="board.html" class="link">🏆 Таблица лидеров</a>
</div>

<script type="module" src="app.js"></script>
<script src="bg.js"></script>
</body>
</html>
